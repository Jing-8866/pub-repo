<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理门户</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- <link rel="stylesheet" href="css/all.min.css"> -->
    <script src="js/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <i class="fas fa-th-large"></i>
                    <h1>系统管理门户</h1>
                </div>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <span class="user-name">管理员</span>
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="welcome-section">
                <h2>欢迎使用系统管理门户</h2>
                <p>选择一个系统开始管理</p>
            </div>
            
            <!-- 搜索栏 -->
            <div class="search-section">
                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="system-search" placeholder="搜索系统名称或描述...">
                        <button class="search-clear" id="clear-search" style="display: none;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="search-filters">
                        <div class="filter-group">
                            <span class="filter-label">筛选:</span>
                            <div class="filter-options">
                                <label class="filter-option">
                                    <input type="checkbox" id="filter-active" checked>
                                    <span class="filter-checkbox"></span>
                                    <span>运行中</span>
                                </label>
                                <label class="filter-option">
                                    <input type="checkbox" id="filter-all" checked>
                                    <span class="filter-checkbox"></span>
                                    <span>全部系统</span>
                                </label>
                            </div>
                        </div>
                        <div class="search-results-info" id="search-results-info">
                            显示全部 5 个系统
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 系统卡片区域 -->
            <div class="systems-grid" id="systems-grid">
                <!-- 系统卡片将由此处的JavaScript动态生成 -->
                <!-- “添加新系统”的卡片建议保留在HTML中，因为它不是来自配置列表 -->
                <div class="system-card add-system">
                    <div class="card-icon">
                        <i class="fas fa-plus"></i>
                    </div>
                    <h3 class="card-title">添加新系统</h3>
                    <p class="card-desc">点击此处配置并添加新的业务系统</p>
                </div>
            </div>

            
            <!-- 无搜索结果提示 -->
            <div class="no-results" id="no-results" style="display: none;">
                <div class="no-results-icon">
                    <i class="fas fa-search"></i>
                </div>
                <h3>未找到匹配的系统</h3>
                <p>尝试使用其他关键词搜索，或调整筛选条件</p>
                <button class="btn btn-primary" id="reset-search">
                    <i class="fas fa-redo"></i> 重置搜索
                </button>
            </div>
            
            <!-- 底部信息 -->
            <div class="footer-info">
                <p>当前时间: <span id="current-time">2026-03-24 10:30:00</span></p>
                <p>系统版本: 2.1.0 | 服务器状态: <span class="server-status">正常</span></p>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/config.js"></script>
    <script>
        /**
         * 动态渲染系统卡片到 #systems-grid 容器中
         * 数据来源：config copy.js 中的 PortalConfig.systems
         */
        function renderSystemCards() {
            const systemsGrid = document.getElementById('systems-grid');
            if (!systemsGrid || !window.PortalConfig) {
                console.error('无法找到系统网格容器或PortalConfig配置。');
                return;
            }

            // 获取系统配置数组
            const systems = PortalConfig.getAllSystems();
            
            // 清空现有动态生成的卡片（避免重复）
            // 注意：这里我们只移除不是 ‘add-system’ 的卡片，保留“添加新系统”卡片
            const dynamicCards = systemsGrid.querySelectorAll('.system-card:not(.add-system)');
            dynamicCards.forEach(card => card.remove());

            // 为每个系统配置生成卡片HTML并插入到“添加新系统”卡片之前
            const addSystemCard = systemsGrid.querySelector('.add-system');
            
            systems.forEach(system => {
                const systemCard = document.createElement('div');
                systemCard.className = 'system-card';
                systemCard.dataset.system = system.id;
                systemCard.dataset.name = system.name;
                systemCard.dataset.description = system.description;
                systemCard.dataset.status = system.status;

                // 根据 config copy.js 中的函数获取状态文本和CSS类
                const statusText = PortalConfig.getStatusText(system.status);
                const statusClass = PortalConfig.getStatusClass(system.status);

                systemCard.innerHTML = `
                    <div class="card-icon">
                        <i class="${system.icon}"></i>
                    </div>
                    <h3 class="card-title">${system.name}</h3>
                    <p class="card-desc">${system.description}</p>
                    <div class="card-footer">
                        <div class="card-status">
                            <i class="fas fa-circle ${statusClass}"></i>
                            <span>${statusText}</span>
                        </div>
                    </div>
                `;

                // 插入卡片，位置在“添加新系统”卡片之前
                systemsGrid.insertBefore(systemCard, addSystemCard);

                // 为动态生成的卡片绑定点击事件（与main.js中的逻辑保持一致）
                systemCard.addEventListener('click', function() {
                    // 这里可以复用或适配 main.js 中的点击跳转逻辑
                    // 例如：window.location.href = `systems/${system.id}/index.html`;
                    // 注意：原main.js中使用的是 data(‘system’)，即 system.id
                    const systemId = this.dataset.system;
                    // 添加点击动画效果（可选，如果main.js已统一处理则不需要）
                    this.style.transform = 'scale(0.98)';
                    this.style.boxShadow = '0 3px 8px rgba(0, 0, 0, 0.1)';
                    setTimeout(() => {
                        this.style.transform = '';
                        this.style.boxShadow = '';
                    }, 150);
                    
                    // 执行跳转，使用 config 中配置的 path，或按照规则拼接
                    // 方案A: 使用配置中的完整 path
                    // window.location.href = system.path;
                    // 方案B: 按照原有规则拼接（与之前静态HTML的 data-system 对应）
                    window.location.href = `systems/${systemId}/index.html`;
                });
            });

            // 动态生成完成后，需要调用 main.js 中的 performSearch() 来初始化筛选和显示
            // 确保 main.js 已加载，且 performSearch 函数在全局可访问
            if (window.performSearch && typeof window.performSearch === 'function') {
                setTimeout(window.performSearch, 0);
            } else {
                console.warn('main.js 中的 performSearch 函数未找到，搜索筛选功能可能无法正常初始化。');
            }
        }

        // 页面加载完成后执行渲染
        document.addEventListener('DOMContentLoaded', renderSystemCards);

    </script>
</body>
</html>
