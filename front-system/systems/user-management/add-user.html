<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加用户 - 用户管理系统</title>
    <!-- 通用样式 -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/form.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- jQuery -->
    <script src="../../js/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar">
            <!-- 侧边栏内容将通过JS加载 -->
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 顶部导航栏 -->
            <header class="main-header" id="mainHeader">
                <!-- 顶部导航栏内容将通过JS加载 -->
            </header>
            
            <!-- 添加用户表单容器 -->
            <div class="form-container">
                <div class="form-wrapper">
                    <!-- 表单卡片 -->
                    <div class="form-card" id="userForm">
                        <div class="form-header">
                            <h3>创建新用户账户</h3>
                            <p>请填写以下信息创建新用户账户</p>
                        </div>
                        
                        <div class="form-body">
                            <!-- 用户名 -->
                            <div class="form-group">
                                <label for="username" class="required">用户名</label>
                                <input type="text" id="username" class="form-control" placeholder="请输入用户名（3-20位字母数字）">
                                <div class="error-message" id="usernameError">用户名长度应在3-20个字符之间</div>
                                <div class="form-hint">用户名将用于登录系统</div>
                            </div>
                            
                            <!-- 昵称 -->
                            <div class="form-group">
                                <label for="nickname" class="required">昵称</label>
                                <input type="text" id="nickname" class="form-control" placeholder="请输入用户昵称">
                                <div class="error-message" id="nicknameError">昵称不能为空</div>
                            </div>
                            
                            <!-- 真实姓名 -->
                            <div class="form-group">
                                <label for="relname" class="required">真实姓名</label>
                                <input type="text" id="relname" class="form-control" placeholder="请输入用户真实姓名">
                                <div class="error-message" id="relnameError">真实姓名不能为空</div>
                            </div>
                            
                            <!-- 性别 -->
                            <div class="form-group">
                                <label for="gender">性别</label>
                                <select id="gender" class="form-control">
                                    <option value="1">男</option>
                                    <option value="2">女</option>
                                    <option value="0">保密</option>
                                </select>
                            </div>
                            
                            <!-- 密码 -->
                            <div class="form-group">
                                <label for="password" class="required">密码</label>
                                <input type="password" id="password" class="form-control" placeholder="请输入密码（8-20位）">
                                <div class="error-message" id="passwordError">密码长度应在8-20个字符之间</div>
                                <div class="form-hint">建议使用字母、数字和特殊字符组合</div>
                            </div>
                            
                            <!-- 确认密码 -->
                            <div class="form-group">
                                <label for="confirmPassword" class="required">确认密码</label>
                                <input type="password" id="confirmPassword" class="form-control" placeholder="请再次输入密码">
                                <div class="error-message" id="confirmPasswordError">两次输入的密码不一致</div>
                            </div>
                            
                            <!-- 角色 -->
                            <div class="form-group">
                                <label for="role" class="required">用户角色</label>
                                <select id="role" class="form-control">
                                    <option value="">请选择用户角色</option>
                                    <option value="system_admin">系统管理员</option>
                                    <option value="admin">管理员</option>
                                    <option value="user">普通用户</option>
                                    <option value="guest">访客</option>
                                </select>
                                <div class="error-message" id="roleError">请选择用户角色</div>
                            </div>
                            
                            <!-- 邮箱 -->
                            <div class="form-group">
                                <label for="email" class="required">邮箱</label>
                                <input type="email" id="email" class="form-control" placeholder="请输入用户邮箱">
                                <div class="error-message" id="emailError">请输入有效的邮箱地址</div>
                            </div>
                            
                            <!-- 手机号 -->
                            <div class="form-group">
                                <label for="phone">手机号</label>
                                <input type="tel" id="phone" class="form-control" placeholder="请输入手机号（可选）">
                                <div class="error-message" id="phoneError">请输入有效的手机号</div>
                            </div>
                            
                            <!-- 状态 -->
                            <div class="form-group">
                                <label for="status" class="required">账户状态</label>
                                <select id="status" class="form-control">
                                    <option value="active">启用</option>
                                    <option value="inactive">停用</option>
                                    <option value="pending">待审核</option>
                                </select>
                                <div class="error-message" id="statusError">请选择账户状态</div>
                            </div>
                            
                            <!-- 备注 -->
                            <div class="form-group full-width">
                                <label for="remark">备注</label>
                                <textarea id="remark" class="form-control" rows="4" placeholder="请输入用户备注信息（可选）"></textarea>
                            </div>
                            
                            <!-- 表单操作按钮 -->
                            <div class="form-actions">
                                <button type="button" class="btn btn-outline btn-lg" id="resetBtn">
                                    <i class="fas fa-redo"></i>
                                    <span>重置</span>
                                </button>
                                <button type="button" class="btn btn-primary btn-lg" id="submitBtn">
                                    <i class="fas fa-user-plus"></i>
                                    <span>创建用户</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 成功提示 -->
                    <div class="form-card form-success" id="successMessage">
                        <div class="success-icon">
                            <i class="fas fa-check"></i>
                        </div>
                        <h4>用户创建成功！</h4>
                        <p>用户账户已成功创建，您可以在用户管理页面查看新添加的用户。</p>
                        <div class="success-actions">
                            <button class="btn btn-outline" onclick="location.href='index.html'">
                                <i class="fas fa-list"></i>
                                <span>查看用户列表</span>
                            </button>
                            <button class="btn btn-primary" id="addAnotherBtn">
                                <i class="fas fa-user-plus"></i>
                                <span>继续添加用户</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载导航栏和表单JS -->
    <script src="js/navigation.js"></script>
    <script src="js/form.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
